language: en-US

reviews:
  profile: assertive
  auto_review:
    enabled: true
    drafts: false
  high_level_summary_instructions: |
    Write all summaries in present tense.
    Describe what the code does, not what it did.
    Example: "This PR adds feature X" instead of "This PR added feature X"

  path_instructions:
    - path: '**/*'
      instructions: |
        ## Contribution guidelines compliance
        Check that the PR follows the Mayara Server contribution guidelines:
        https://github.com/MarineYachtRadar/mayara-server/blob/main/CONTRIBUTING.md
        and the authoring rules in:
        https://github.com/MarineYachtRadar/mayara-server/blob/main/AGENTS.md
        Flag any deviation in PR structure, commit message format, PR scope
        ("one logical change per PR"), or documentation requirements.

        ## Conventional commit PR title
        The PR title must follow Angular conventional commit format:
        <type>(<scope>): <subject>
        Accepted types: feat, fix, docs, style, refactor, test, chore, perf, ci.
        Subject: imperative mood ("add" not "added"), no trailing period,
        under 70 characters. The PR title becomes the squash-merge commit
        on main and feeds the auto-generated changelog via git-cliff.

        ## CHANGELOG.md must not be edited manually
        CHANGELOG.md is auto-generated by git-cliff from conventional commits
        in .github/workflows/changelog.yml and release.yml. Flag any PR that
        modifies CHANGELOG.md directly — the only valid way to change the
        changelog is to change the commit message of the PR.

        ## Version numbers are maintainer-managed
        Flag any PR that changes the version in Cargo.toml. Version bumps
        happen in separate release-preparation commits controlled by
        maintainers, never in contribution PRs.

        ## Echo comments
        Flag any comment that merely restates what the code already says.
        Examples of echo comments to flag:
        - `// Set the range` above a line that sets a range field
        - `// Loop through spokes` above a `for` loop over spokes
        These add noise without adding meaning. Request removal or replacement
        with a comment explaining *why*, not *what*.

        ## Leftover crumbs from intermediate commits
        Check for references to things that existed in earlier commits of this
        PR but are no longer present — removed variables, old function names,
        deleted files, superseded approaches. These are confusing to future
        readers. Flag any comments, docs, or code that refer to something not
        present in the current state of the branch.

        ## Documentation drift risk
        Flag any .md file that contains detailed implementation steps, specific
        API call sequences, code snippets, or configuration values that are
        likely to fall out of sync as the code evolves. Documentation should
        describe architecture and how things work conceptually — not
        step-by-step instructions that duplicate or shadow the code itself.
        Radar protocol reverse-engineering notes in docs/ and research
        repositories are an intentional exception — they are frozen-in-time
        observations, not live documentation.

        ## Unchecked items in test plans
        If a PR description or any .md file contains a checklist with unchecked
        items, flag it. Either the work is incomplete, or the checklist should
        be removed before merge. Do not let unchecked boxes pass silently.

        ## Speculative test plans
        Flag any PR description "Tested" section that lists manual tests as
        intentions or plans rather than things that were actually run. The
        Tested section must describe what the author has verified, not what
        they intend to verify later.

        ## AI attribution footers
        Flag any commit message, PR description, or code comment containing
        "Co-Authored-By: Claude", "Generated with Claude Code", "🤖 Generated
        with", or similar AI-attribution footers. These do not belong in the
        project history.

        ## Implementation status in documentation
        Flag implementation-progress narratives in product and reference
        documentation (e.g. "Step 3: implement X", "TODO: add Y", "currently
        implemented as Z"). This belongs in PR descriptions or commit
        messages, not in documentation. Architecture decisions and design
        rationale are fine. Build-progress narratives are not.
        Do NOT flag stable user/maintainer workflow documentation that is
        intentionally procedural — CONTRIBUTING.md, BUILDING.md, USAGE.md,
        release-flow sections, and similar. Procedural content is their
        job.

        ## Scope
        Focus on files changed since main. Think carefully about how changes
        interact with existing code and documentation — not just the diff in
        isolation.
